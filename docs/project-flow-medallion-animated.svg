<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#111C31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121B30"/>
      <stop offset="100%" stop-color="#0E1628"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B541D"/>
      <stop offset="100%" stop-color="#C97722"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A97A7"/>
      <stop offset="100%" stop-color="#C9D3DD"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6A326"/>
      <stop offset="100%" stop-color="#FFD86A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48CCFF"/>
      <stop offset="100%" stop-color="#68FFB8"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020611" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 58px 'Inter', 'Segoe UI', sans-serif; fill: #F7F9FC; }
      .subtitle { font: 400 24px 'Inter', 'Segoe UI', sans-serif; fill: #B5C1D9; }
      .section { font: 700 24px 'Inter', 'Segoe UI', sans-serif; fill: #F5F8FC; }
      .label { font: 800 32px 'Inter', 'Segoe UI', sans-serif; fill: #F7F9FC; }
      .body { font: 500 18px 'Inter', 'Segoe UI', sans-serif; fill: #D3DCEB; }
      .eyebrow { font: 700 15px 'Inter', 'Segoe UI', sans-serif; fill: #95A7C7; letter-spacing: 1.6px; }
      .dash {
        stroke-dasharray: 10 10;
        animation: dashmove 16s linear infinite;
      }
      @keyframes dashmove {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -320; }
      }
      .pulse {
        transform-origin: center;
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      .particle { opacity: 0; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="175" cy="130" r="185" fill="#1C2849" opacity="0.28"/>
  <circle cx="1450" cy="860" r="250" fill="#17304C" opacity="0.18"/>

  <text x="90" y="94" class="title">Data Platform Copilot</text>
  <text x="90" y="136" class="subtitle">Medallion data flow with metadata, orchestration, analytics and product delivery</text>

  <text x="120" y="225" class="section">Sources</text>
  <text x="610" y="225" class="section">Medallion Flow</text>
  <text x="1210" y="225" class="section">Consumption</text>

  <g filter="url(#shadow)" class="pulse">
    <rect x="110" y="280" width="300" height="140" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="140" y="325" class="eyebrow">TRANSACTIONAL SOURCE</text>
    <text x="140" y="365" class="label">PostgreSQL</text>
    <text x="140" y="398" class="body">Novadrive operational data</text>
  </g>

  <g filter="url(#shadow)" class="pulse">
    <rect x="110" y="470" width="300" height="140" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="140" y="515" class="eyebrow">METADATA SOURCE</text>
    <text x="140" y="555" class="label">Databricks</text>
    <text x="140" y="588" class="body">Unity Catalog datasets and owner metadata</text>
  </g>

  <g filter="url(#shadow)" class="pulse">
    <rect x="470" y="280" width="260" height="140" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="500" y="325" class="eyebrow">ORCHESTRATION</text>
    <text x="500" y="365" class="label">Airflow Docker</text>
    <text x="500" y="398" class="body">Hourly DAG runtime</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="250" width="230" height="120" rx="24" fill="url(#bronze)" stroke="#E39A3F"/>
    <text x="820" y="292" class="eyebrow">BRONZE</text>
    <text x="820" y="330" class="label">GCS Bronze</text>
    <text x="820" y="360" class="body">Raw JSONL extracts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="250" width="230" height="120" rx="24" fill="url(#bronze)" stroke="#E39A3F"/>
    <text x="1100" y="292" class="eyebrow">BRONZE</text>
    <text x="1100" y="330" class="label">BQ Bronze</text>
    <text x="1100" y="360" class="body">Raw warehouse landing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="450" width="230" height="120" rx="24" fill="url(#silver)" stroke="#D5DEE7"/>
    <text x="820" y="492" class="eyebrow">SILVER</text>
    <text x="820" y="530" class="label">BQ Silver</text>
    <text x="820" y="560" class="body">Normalized vendas entity</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="450" width="230" height="120" rx="24" fill="url(#gold)" stroke="#FFE18A"/>
    <text x="1100" y="492" class="eyebrow">GOLD</text>
    <text x="1100" y="530" class="label">BQ Gold</text>
    <text x="1100" y="560" class="body">Analytical marts and KPIs</text>
  </g>

  <g filter="url(#shadow)" class="pulse">
    <rect x="1370" y="250" width="170" height="120" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="1396" y="292" class="eyebrow">API</text>
    <text x="1396" y="330" class="label">FastAPI</text>
    <text x="1396" y="360" class="body">Cloud Run</text>
  </g>

  <g filter="url(#shadow)" class="pulse">
    <rect x="1370" y="430" width="170" height="120" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="1396" y="472" class="eyebrow">COPILOT</text>
    <text x="1396" y="510" class="label">Chat</text>
    <text x="1396" y="540" class="body">Metadata + Q&amp;A</text>
  </g>

  <g filter="url(#shadow)" class="pulse">
    <rect x="1370" y="610" width="170" height="120" rx="24" fill="url(#panel)" stroke="#2B4066"/>
    <text x="1396" y="652" class="eyebrow">PRESENTATION</text>
    <text x="1396" y="690" class="label">React UI</text>
    <text x="1396" y="720" class="body">Frontend demo</text>
  </g>

  <path d="M410 350 C440 350, 445 350, 470 350" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M730 350 C758 350, 764 310, 790 310" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1020 310 C1048 310, 1042 310, 1070 310" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1185 370 C1185 410, 1185 410, 1185 450" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1020 510 C1048 510, 1042 510, 1070 510" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1300 510 C1330 510, 1338 330, 1370 330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1300 510 C1330 510, 1338 490, 1370 490" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" class="dash"/>
  <path d="M1455 370 C1455 398, 1455 404, 1455 430" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" class="dash" opacity="0.7"/>
  <path d="M1455 550 C1455 578, 1455 584, 1455 610" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" class="dash" opacity="0.7"/>
  <path d="M410 540 C612 540, 1180 120, 1370 490" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" class="dash" opacity="0.28"/>

  <circle r="9" fill="#67FFB7" class="particle">
    <animateMotion dur="6s" repeatCount="indefinite" path="M410 350 C440 350, 445 350, 470 350"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#48CCFF" class="particle">
    <animateMotion dur="6s" begin="0.8s" repeatCount="indefinite" path="M730 350 C758 350, 764 310, 790 310"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#FFCB59" class="particle">
    <animateMotion dur="6s" begin="1.6s" repeatCount="indefinite" path="M1020 310 C1048 310, 1042 310, 1070 310"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#FFCB59" class="particle">
    <animateMotion dur="6s" begin="2.4s" repeatCount="indefinite" path="M1185 370 C1185 410, 1185 410, 1185 450"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#67FFB7" class="particle">
    <animateMotion dur="6s" begin="3.2s" repeatCount="indefinite" path="M1020 510 C1048 510, 1042 510, 1070 510"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#48CCFF" class="particle">
    <animateMotion dur="6s" begin="4s" repeatCount="indefinite" path="M1300 510 C1330 510, 1338 330, 1370 330"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="9" fill="#67FFB7" class="particle">
    <animateMotion dur="6s" begin="4.8s" repeatCount="indefinite" path="M1300 510 C1330 510, 1338 490, 1370 490"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="4.8s" repeatCount="indefinite"/>
  </circle>

  <g>
    <rect x="112" y="818" width="1428" height="42" rx="21" fill="#0F192C" stroke="#243754"/>
    <circle cx="142" cy="839" r="8" fill="#67FFB7"/>
    <text x="164" y="846" class="body">Primary medallion path: PostgreSQL → Airflow → GCS Bronze → BQ Bronze → BQ Silver → BQ Gold → FastAPI → Chat / React</text>
  </g>
</svg>
